<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff">
  <title>goalpad</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="home"></div>

  <div id="editor" hidden>
    <header id="topbar">
      <button id="btn-back" class="nav" type="button">‹ Library</button>
      <span id="doc-title" class="doc-title"></span>
      <div class="top-actions">
        <button id="btn-edit" type="button">Edit</button>
        <button id="btn-undo" type="button" aria-label="Undo">↶</button>
        <button id="btn-redo" type="button" aria-label="Redo">↷</button>
        <button id="btn-setup" type="button">Setup</button>
        <button id="btn-done" type="button">Done</button>
      </div>
    </header>

    <main id="stage">
      <svg id="board" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <g id="layer-field"></g>
        <g id="layer-annotations"></g>
        <g id="layer-tokens"></g>
      </svg>
    </main>

    <nav id="toolbar">
      <button class="chip" data-chip="A" type="button" aria-label="Team A player"><svg viewBox="-16 -16 32 32" width="24" height="24"><circle r="12" fill="#0a0a0a"></circle></svg></button>
      <button class="chip" data-chip="B" type="button" aria-label="Team B player"><svg viewBox="-16 -16 32 32" width="24" height="24"><circle r="12" fill="#ffffff" stroke="#0a0a0a" stroke-width="1.5"></circle></svg></button>
      <button class="chip" data-chip="ball" type="button" aria-label="Ball"><svg viewBox="-16 -16 32 32" width="24" height="24"><circle r="7" fill="#e10600"></circle></svg></button>
      <button class="chip" data-chip="cone" type="button" aria-label="Cone"><svg viewBox="-16 -16 32 32" width="24" height="24"><path d="M0,-11 L-9,8 L9,8 Z" fill="none" stroke="#0a0a0a" stroke-width="1.5"></path></svg></button>
      <span class="tool-divider"></span>
      <button class="tool" data-ink="arrow" type="button">Arrow</button>
      <button class="tool" data-ink="run" type="button">Run</button>
      <button class="tool" data-ink="pen" type="button">Pen</button>
      <button class="tool" data-ink="text" type="button">Text</button>
    </nav>

    <footer id="stepsbar">
      <button id="btn-step-prev" type="button">◀</button>
      <input id="scrub" type="range" min="0" max="0" step="0.01" value="0">
      <button id="btn-step-next" type="button">▶</button>
      <span id="step-label">1 / 1</span>
      <button id="btn-play" type="button">▶ Play</button>
    </footer>
    <footer id="filmbar">
      <div id="filmstrip"></div>
      <button id="btn-play-build" type="button">▶ Play</button>
    </footer>
  </div>

  <div id="panel-setup" class="panel" hidden>
    <div class="panel-card">
      <h2>Setup</h2>
      <label>Field / game size
        <select id="setup-preset">
          <option value="11v11">11 v 11</option>
          <option value="9v9">9 v 9</option>
          <option value="7v7">7 v 7</option>
          <option value="custom">Custom (small-sided grid)</option>
        </select>
      </label>
      <label>Pitch
        <select id="setup-half">
          <option value="full">Full</option>
          <option value="left">Left half</option>
          <option value="right">Right half</option>
        </select>
      </label>
      <label>Team A players <input id="setup-teamA" type="number" min="0" max="11" value="11"></label>
      <label>Team B players <input id="setup-teamB" type="number" min="0" max="11" value="11"></label>
      <p class="panel-note">Set both counts to 0 for an empty pitch. Changing the setup rebuilds the board.</p>
      <div class="panel-actions">
        <button id="setup-cancel" type="button">Cancel</button>
        <button id="setup-apply" type="button">Apply</button>
      </div>
    </div>
  </div>

  <input id="import-file" type="file" accept="application/json" hidden>

  <script type="module" src="js/app.js"></script>
</body>
</html>
